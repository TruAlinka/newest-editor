<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Редактор Игры</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; gap: 20px; padding: 20px; background-color: #f4f4f9; color: #333; min-height: 100vh; box-sizing: border-box; margin: 0; }
    .editor, .preview { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); overflow-y: auto; }
    .editor-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; margin-bottom: 15px; }
    h1, h2 { margin: 0; padding: 0; }
    h2 { margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input[type='text'], input[type='url'], textarea, select { width: 95%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
    textarea { height: 150px; resize: vertical; font-family: monospace; }
    .controls-group { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; margin-top: 10px; }
    .control-item { display: flex; flex-direction: column; }
    .control-item-row { display: flex; align-items: center; gap: 10px; }
    input[type='color'] { width: 50px; height: 40px; border: none; padding: 0; cursor: pointer; }
    input[type='range'] { flex-grow: 1; }
    #generate-btn { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    #generate-btn:hover { background-color: #0056b3; }
    #lang-toggle { padding: 8px 12px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    #lang-toggle:hover { background-color: #5a6268; }
    #output-code, #output-iframe { font-family: monospace; white-space: pre-wrap; background-color: #2d2d2d; color: #f1f1f1; height: 200px; border-radius: 4px; margin-top: 5px; resize: vertical; }
    #preview-container { width: 100%; height: 720px; border: 1px solid #ccc; border-radius: 4px; }
    .help-text { font-size: 14px; color: #666; margin-top: 5px; background: #f9f9f9; padding: 10px; border-radius: 4px; }
    .feedback-image-input { font-weight: normal; font-size: 14px; }
    button.copy-btn, button.download-btn { margin-top: 8px; width: fit-content; background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 14px; margin-bottom: 10px; }
    button.copy-btn:hover, button.download-btn:hover { background-color: #0056b3; }
  </style>
</head>
<body>
  <div class="editor">
    <div class="editor-header">
      <h1 id="editor-title">Редактор Игры</h1>
      <button id="lang-toggle">EN</button>
    </div>

    <h2 id="section-general">1. Общие настройки</h2>
    <label for="game-title" id="label-game-title">Название/тема игры:</label>
    <input type="text" id="game-title" value="Интерактивная Викторина" />

    <h2 id="section-appearance">2. Внешний вид</h2>
    <div class="controls-group">
      <div class="control-item">
        <label for="bg-color" id="label-bg-color">Цвет фона:</label>
        <input type="color" id="bg-color" value="#f0f8ff" />
      </div>
      <div class="control-item">
        <label for="definition-bg-color" id="label-definition-bg-color">Фон блока вопроса:</label>
        <input type="color" id="definition-bg-color" value="#ffffff" />
      </div>
    </div>
    <div class="controls-group">
      <div class="control-item">
        <label for="btn-check-bg-color" id="label-btn-check-bg-color">Цвет фона "Проверить":</label>
        <input type="color" id="btn-check-bg-color" value="#007bff" />
      </div>
      <div class="control-item">
        <label for="btn-check-text-color" id="label-btn-check-text-color">Цвет текста "Проверить":</label>
        <input type="color" id="btn-check-text-color" value="#ffffff" />
      </div>
    </div>
    <div class="controls-group">
      <div class="control-item">
        <label for="btn-restart-bg-color" id="label-btn-restart-bg-color">Цвет фона "Сброс":</label>
        <input type="color" id="btn-restart-bg-color" value="#ffc107" />
      </div>
      <div class="control-item">
        <label for="btn-restart-text-color" id="label-btn-restart-text-color">Цвет текста "Сброс":</label>
        <input type="color" id="btn-restart-text-color" value="#333333" />
      </div>
    </div>
    <div>
      <label for="btn-radius" id="label-btn-radius">Скругленность углов:</label>
      <div class="control-item-row">
        <input type="range" id="btn-radius" min="0" max="25" value="8" />
        <span id="btn-radius-value">8px</span>
      </div>
    </div>

    <h2 id="section-game-type">3. Тип игры</h2>
    <label for="game-type" id="label-game-type">Выберите тип задания:</label>
    <select id="game-type">
      <option value="anagram">Расставить буквы</option>
      <option value="input">Впечатать ответ</option>
    </select>

    <h2 id="section-content">4. Содержимое игры</h2>
    <label for="game-data" id="label-game-data">Вопросы и ответы:</label>
    <div class="help-text" id="help-text">Формат: <b>Вопрос | Ответ | Ссылка на картинку (необязательно)</b></div>
    <textarea id="game-data">Самая большая планета Солнечной системы | Юпитер | https://i.ibb.co/L8y2hQZ/jupiter.png
Столица Японии | Токио | https://i.ibb.co/Wc6YpQ8/tokyo.jpg
Процесс превращения воды в пар | Испарение |</textarea>

    <h2 id="section-feedback">5. Обратная связь</h2>
    <label for="feedback-correct" id="label-feedback-correct">Текст при верном ответе:</label>
    <input type="text" id="feedback-correct" value="Верно! Отлично!" />
    <label for="feedback-correct-img" class="feedback-image-input" id="label-feedback-correct-img">Изображение (URL):</label>
    <input type="url" id="feedback-correct-img" placeholder="https://example.com/happy.png" />
    
    <label for="feedback-incorrect" id="label-feedback-incorrect">Текст при неверном ответе:</label>
    <input type="text" id="feedback-incorrect" value="Ошибка, попробуй еще раз." />
    <label for="feedback-incorrect-img" class="feedback-image-input" id="label-feedback-incorrect-img">Изображение (URL):</label>
    <input type="url" id="feedback-incorrect-img" placeholder="https://example.com/sad.png" />

    <label for="feedback-final" id="label-feedback-final">Текст по завершении игры:</label>
    <input type="text" id="feedback-final" value="Игра окончена! Вы молодец!" />
    
    <label for="final-effect-select" id="label-final-effect-select">Финальный эффект:</label>
    <select id="final-effect-select">
      <option value="none">Нет эффекта</option>
      <option value="salute">Салют</option>
      <option value="confetti">Хлопушки</option>
      <option value="hearts">Сердечки</option>
      <option value="custom">Своя ссылка</option>
    </select>
    <input type="url" id="final-effect-custom-url" placeholder="https://example.com/your.gif" style="display:none;" />

    <button id="generate-btn">Сгенерировать код</button>

    <h2 id="section-code">6. Готовый код</h2>
    <label for="output-iframe" id="label-output-iframe">Код для вставки (iframe):</label>
    <button id="copy-iframe-btn" class="copy-btn">Скопировать</button>
    <textarea id="output-iframe" readonly></textarea>

    <label for="output-code" id="label-output-code">Полный HTML-код:</label>
    <button id="copy-html-btn" class="copy-btn">Скопировать</button>
    <button id="download-html-btn" class="download-btn">Скачать HTML</button>
    <textarea id="output-code" readonly></textarea>
  </div>

  <div class="preview">
    <h1 id="preview-title">Превью Игры</h1>
    <iframe id="preview-container" title="Превью игры"></iframe>
  </div>

<script>
// --- TRANSLATIONS AND UI ELEMENTS ---
const translations = {
    ru: { editorTitle: "Редактор Игры", previewTitle: "Превью Игры", sectionGeneral: "1. Общие настройки", labelGameTitle: "Название/тема игры:", sectionAppearance: "2. Внешний вид", labelBgColor: "Цвет фона:", labelDefinitionBgColor: "Фон блока вопроса:", labelBtnCheckBgColor: 'Цвет фона "Проверить":', labelBtnCheckTextColor: 'Цвет текста "Проверить":', labelBtnRestartBgColor: 'Цвет фона "Сброс":', labelBtnRestartTextColor: 'Цвет текста "Сброс":', labelBtnRadius: "Скругленность углов:", sectionGameType: "3. Тип игры", labelGameType: "Выберите тип задания:", sectionContent: "4. Содержимое игры", labelGameData: "Вопросы и ответы:", helpText: "Формат: <b>Вопрос | Ответ | Ссылка на картинку (необязательно)</b>", sectionFeedback: "5. Обратная связь", labelFeedbackCorrect: "Текст при верном ответе:", labelFeedbackCorrectImg: "Изображение (URL):", labelFeedbackIncorrect: "Текст при неверном ответе:", labelFeedbackIncorrectImg: "Изображение (URL):", labelFeedbackFinal: "Текст по завершении игры:", labelFinalEffectSelect: "Финальный эффект:", generateBtn: "Сгенерировать код", sectionCode: "6. Готовый код", labelOutputIframe: "Код для вставки (iframe):", labelOutputCode: "Полный HTML-код:", copySuccess: "Код скопирован!", downloadSuccess: "Файл скачан!" },
    en: { editorTitle: "Game Editor", previewTitle: "Game Preview", sectionGeneral: "1. General Settings", labelGameTitle: "Game Title/Theme:", sectionAppearance: "2. Appearance", labelBgColor: "Background Color:", labelDefinitionBgColor: "Question block background:", labelBtnCheckBgColor: "Check button background:", labelBtnCheckTextColor: "Check button text:", labelBtnRestartBgColor: "Restart button background:", labelBtnRestartTextColor: "Restart button text:", labelBtnRadius: "Button corner rounding:", sectionGameType: "3. Game Type", labelGameType: "Choose task type:", sectionContent: "4. Game Content", labelGameData: "Questions and Answers:", helpText: "Format: <b>Question | Answer | Image URL (optional)</b>", sectionFeedback: "5. Feedback", labelFeedbackCorrect: "Text for correct answer:", labelFeedbackCorrectImg: "Image (URL):", labelFeedbackIncorrect: "Text for incorrect answer:", labelFeedbackIncorrectImg: "Image (URL):", labelFeedbackFinal: "Text for game completion:", labelFinalEffectSelect: "Final Effect:", generateBtn: "Generate Code", sectionCode: "6. Resulting Code", labelOutputIframe: "Code for embedding (iframe):", labelOutputCode: "Full HTML code:", copySuccess: "Code copied!", downloadSuccess: "File downloaded!" }
};
let currentLang = "ru";
const UI = {
    bgColor: document.getElementById("bg-color"), definitionBgColor: document.getElementById("definition-bg-color"), btnCheckBgColor: document.getElementById("btn-check-bg-color"), btnCheckTextColor: document.getElementById("btn-check-text-color"), btnRestartBgColor: document.getElementById("btn-restart-bg-color"), btnRestartTextColor: document.getElementById("btn-restart-text-color"), btnRadius: document.getElementById("btn-radius"), btnRadiusValue: document.getElementById("btn-radius-value"), gameTitle: document.getElementById("game-title"), gameType: document.getElementById("game-type"), gameData: document.getElementById("game-data"), feedbackCorrect: document.getElementById("feedback-correct"), feedbackCorrectImg: document.getElementById("feedback-correct-img"), feedbackIncorrect: document.getElementById("feedback-incorrect"), feedbackIncorrectImg: document.getElementById("feedback-incorrect-img"), feedbackFinal: document.getElementById("feedback-final"), finalEffectSelect: document.getElementById("final-effect-select"), finalEffectCustomUrl: document.getElementById("final-effect-custom-url"), generateBtn: document.getElementById("generate-btn"), langToggle: document.getElementById("lang-toggle"), outputCode: document.getElementById("output-code"), outputIframe: document.getElementById("output-iframe"), previewFrame: document.getElementById("preview-container"), copyIframeBtn: document.getElementById("copy-iframe-btn"), copyHtmlBtn: document.getElementById("copy-html-btn"), downloadHtmlBtn: document.getElementById("download-html-btn")
};

// --- FUNCTIONS ---
function setLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.querySelectorAll("[id]").forEach(el => {
        const key = el.id.replace(/-([a-z])/g, g => g[1].toUpperCase());
        if (t[key]) {
            if (el.innerHTML.includes("<b>")) el.innerHTML = t[key];
            else el.textContent = t[key];
        }
    });
    document.querySelectorAll("label[for]").forEach(label => {
        const key = label.id;
        if (t[key]) label.textContent = t[key];
    });
    document.getElementById('lang-toggle').textContent = lang === 'ru' ? 'EN' : 'RU';
}

function generateGame() {
    const settings = {
        title: UI.gameTitle.value, bgColor: UI.bgColor.value, defBgColor: UI.definitionBgColor.value, btnCheckBg: UI.btnCheckBgColor.value, btnCheckText: UI.btnCheckTextColor.value, btnRestartBg: UI.btnRestartBgColor.value, btnRestartText: UI.btnRestartTextColor.value, btnRadius: UI.btnRadius.value, correctText: UI.feedbackCorrect.value, correctImg: UI.feedbackCorrectImg.value, incorrectText: UI.feedbackIncorrect.value, incorrectImg: UI.feedbackIncorrectImg.value, finalText: UI.feedbackFinal.value,
        finalEffect: UI.finalEffectSelect.value, finalEffectUrl: UI.finalEffectCustomUrl.value
    };
    const gameData = UI.gameData.value.trim().split('\n').map(line => {
        const parts = line.split('|');
        return parts.length < 2 ? null : { q: parts[0].trim(), a: parts[1].trim(), img: (parts[2] || "").trim() };
    }).filter(Boolean);

    const gameHtml = UI.gameType.value === 'anagram' ? generateAnagramGame(settings, gameData) : generateInputGame(settings, gameData);

    UI.outputCode.value = gameHtml;
    UI.outputIframe.value = `<iframe srcdoc="${gameHtml.replace(/"/g, '&quot;')}" width="100%" height="720" style="border:none;" title="Game"></iframe>`;
    UI.previewFrame.srcdoc = gameHtml;
}

function getFinalEffectUrl(settings) {
    if (settings.finalEffect === 'custom') return settings.finalEffectUrl;
    const effects = {
        salute: "https://i.gifer.com/origin/bc/bc03d8ca84663c44fae89a4510bca8a3.gif",
        confetti: "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
        hearts: "https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif"
    };
    return effects[settings.finalEffect] || "";
}

function generateBaseCss(s) {
    return `body{font-family:sans-serif;background-color:${s.bgColor};margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;box-sizing:border-box}
    .container{background:white;max-width:600px;width:90%;padding:20px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1);text-align:center}
    h1{margin:0 0 15px}
    #game-image{max-width:100%;max-height:150px;border-radius:8px;margin:0 auto 20px;object-fit:contain;display:block}
    .definition{font-size:1.2em;margin-bottom:20px;background-color:${s.defBgColor};padding:10px;border-radius:8px;min-height:50px}
    #feedback{margin-top:20px;font-size:1.1em;font-weight:700;min-height:1.5em}
    #feedback-image{max-width:80px;margin-top:10px;border-radius:8px}
    .correct{color:#28a745}.error{color:#dc3545}
    .button{border:none;border-radius:${s.btnRadius}px;cursor:pointer;font-weight:bold;padding:12px 24px;margin:5px;user-select:none;transition:filter 0.2s}
    .button:hover{filter:brightness(0.9)}
    #check-btn{background-color:${s.btnCheckBg};color:${s.btnCheckText}}
    .final-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:999;cursor:pointer}
    .final-overlay img{max-width:90vw;max-height:90vh;border-radius:12px}`;
}

function generateAnagramGame(s, data) {
    const css = generateBaseCss(s) + `#clear-btn{background-color:${s.btnRestartBg};color:${s.btnRestartText}}
    .answer-display,.letter-pool{margin:20px 0;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
    .answer-display{background:#eee;border-radius:8px;padding:15px;min-height:50px;border:2px dashed #ccc}
    .letter-btn{font-size:1.5em;width:50px;height:50px;background-color:${s.btnCheckBg};color:${s.btnCheckText};display:flex;justify-content:center;align-items:center}
    .letter-btn.placed{background-color:#6c757d;cursor:default}
    .controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}`;
    const js = `let i=0;const d=${JSON.stringify(data)},s=${JSON.stringify(s)},u="${getFinalEffectUrl(s)}";const E={h:document.querySelector("h1"),img:document.getElementById("game-image"),def:document.querySelector(".definition"),ans:document.querySelector(".answer-display"),pool:document.querySelector(".letter-pool"),fb:document.getElementById("feedback"),fbi:document.getElementById("feedback-image"),ctrls:document.querySelector(".controls")};function showFbImg(u){E.fbi.src=u;E.fbi.style.display=u?"block":"none"}function l(){showFbImg(null);if(i>=d.length){E.def.textContent=s.finalText;E.img.style.display="none";E.ans.innerHTML="";E.pool.innerHTML="";E.ctrls.style.display="none";if(u){const e=document.createElement("div");e.className="final-overlay";e.innerHTML=\`<img src="\${u}">\`;e.onclick=()=>e.remove();document.body.appendChild(e)}return}const{q,a,img}=d[i];E.def.textContent=q;E.img.src=img;E.img.style.display=img?"block":"none";E.ans.innerHTML="";E.pool.innerHTML="";[...a.toUpperCase().replace(/\\s/g,"")].sort(()=>.5-Math.random()).forEach(t=>{const a=document.createElement("button");a.className="button letter-btn";a.textContent=t;a.onclick=()=>{if(a.classList.contains("placed"))return;a.classList.add("placed");const e=document.createElement("button");e.className="button letter-btn";e.textContent=t;e.onclick=()=>{a.classList.remove("placed");e.remove()};E.ans.appendChild(e)};E.pool.appendChild(a)})}E.ctrls.querySelector("#check-btn").onclick=()=>{const t=[...E.ans.children].map(e=>e.textContent).join(""),a=d[i].a.toUpperCase().replace(/\\s/g,"");if(t===a){E.fb.textContent=s.correctText;E.fb.className="correct";showFbImg(s.correctImg);i++;setTimeout(l,1500)}else{E.fb.textContent=s.incorrectText;E.fb.className="error";showFbImg(s.incorrectImg)}};E.ctrls.querySelector("#clear-btn").onclick=()=>l();l();`;
    return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${s.title}</title><style>${css}</style></head><body><div class="container"><h1>${s.title}</h1><img id="game-image" src=""><p class="definition"></p><div class="answer-display"></div><div class="letter-pool"></div><div class="controls"><button id="check-btn" class="button">Проверить</button><button id="clear-btn" class="button">Сброс</button></div><p id="feedback"></p><img id="feedback-image" style="display:none;"></div><script>${js}<\/script></body></html>`;
}

function generateInputGame(s, data) {
    const css = generateBaseCss(s) + `#answer-input{width:60%;padding:10px;font-size:1.1em;text-align:center;border:2px solid #ccc;border-radius:${s.btnRadius}px}
    #answer-input:focus{border-color:${s.btnCheckBg};outline:0}
    .controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap}`;
    const js = `let i=0;const d=${JSON.stringify(data)},s=${JSON.stringify(s)},u="${getFinalEffectUrl(s)}";const E={h:document.querySelector("h1"),img:document.getElementById("game-image"),def:document.querySelector(".definition"),inp:document.getElementById("answer-input"),fb:document.getElementById("feedback"),fbi:document.getElementById("feedback-image"),ctrls:document.querySelector(".controls")};function showFbImg(u){E.fbi.src=u;E.fbi.style.display=u?"block":"none"}function l(){showFbImg(null);if(i>=d.length){E.def.textContent=s.finalText;E.img.style.display="none";E.ctrls.style.display="none";if(u){const e=document.createElement("div");e.className="final-overlay";e.innerHTML=\`<img src="\${u}">\`;e.onclick=()=>e.remove();document.body.appendChild(e)}return}const{q,img}=d[i];E.def.textContent=q;E.img.src=img;E.img.style.display=img?"block":"none";E.inp.value="";E.inp.focus()}function check(){const t=E.inp.value.trim().toLowerCase(),a=d[i].a.trim().toLowerCase();if(t===a){E.fb.textContent=s.correctText;E.fb.className="correct";showFbImg(s.correctImg);i++;setTimeout(l,1500)}else{E.fb.textContent=s.incorrectText;E.fb.className="error";showFbImg(s.incorrectImg)}}E.ctrls.querySelector("#check-btn").onclick=check;E.inp.onkeydown=e=>"Enter"===e.key&&check();l();`;
    return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${s.title}</title><style>${css}</style></head><body><div class="container"><h1>${s.title}</h1><img id="game-image" src=""><p class="definition"></p><div class="controls"><input type="text" id="answer-input" placeholder="Введите ответ..."><button id="check-btn" class="button">Проверить</button></div><p id="feedback"></p><img id="feedback-image" style="display:none;"></div><script>${js}<\/script></body></html>`;
}

// --- EVENT LISTENERS ---
UI.langToggle.addEventListener("click", () => setLanguage(currentLang === "ru" ? "en" : "ru"));
UI.generateBtn.addEventListener("click", generateGame);
UI.btnRadius.addEventListener("input", e => UI.btnRadiusValue.textContent = `${e.target.value}px`);
UI.finalEffectSelect.addEventListener("change", () => {
    UI.finalEffectCustomUrl.style.display = UI.finalEffectSelect.value === 'custom' ? 'block' : 'none';
});
UI.copyIframeBtn.addEventListener("click", () => navigator.clipboard.writeText(UI.outputIframe.value).then(() => alert(translations[currentLang].copySuccess)));
UI.copyHtmlBtn.addEventListener("click", () => navigator.clipboard.writeText(UI.outputCode.value).then(() => alert(translations[currentLang].copySuccess)));
UI.downloadHtmlBtn.addEventListener("click", () => {
    const blob = new Blob([UI.outputCode.value], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "game.html";
    a.click();
    URL.revokeObjectURL(a.href);
    alert(translations[currentLang].downloadSuccess);
});
window.addEventListener("load", () => {
    setLanguage("ru");
    generateGame();
    UI.btnRadiusValue.textContent = `${UI.btnRadius.value}px`;
});
</script>
</body>
</html>
